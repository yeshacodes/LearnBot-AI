
<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnBot - Your Pastel Learning Assistant</title>
    <script>
        try {
            const savedTheme = localStorage.getItem('learnbot_theme');
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark');
            }
        } catch (_) {}
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: 'var(--bg)',
                        sidebar: 'var(--surface)',
                        card: 'var(--surface)',
                        surface: 'var(--surface)',
                        surface2: 'var(--surface2)',
                        default: 'var(--border)',
                        primary: 'var(--text)',
                        muted: 'var(--muted)',
                        accent: 'var(--accent)',
                        'hover-bg': 'var(--surface2)',
                    }
                }
            }
        };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "@google/genai": "https://esm.sh/@google/genai@^1.40.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="h-full bg-background text-primary overflow-y-auto">
    <div id="root" class="h-full"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
